<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Calculator icon background -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="#0f172a"/>
  
  <!-- Screen -->
  <rect x="7" y="10" width="26" height="10" rx="3" fill="#38bdf8"/>
  
  <!-- Equals sign on screen -->
  <rect x="17" y="13" width="8" height="1.5" rx="0.75" fill="#0f172a"/>
  <rect x="17" y="16" width="8" height="1.5" rx="0.75" fill="#0f172a"/>

  <!-- Button grid -->
  <rect x="7" y="24" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="14" y="24" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="21" y="24" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="28" y="24" width="5" height="4" rx="1.5" fill="#38bdf8"/>

  <rect x="7" y="30" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="14" y="30" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="21" y="30" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="28" y="30" width="5" height="4" rx="1.5" fill="#e2e8f0"/>

  <rect x="7" y="36" width="12" height="4" rx="1.5" fill="#0f172a" opacity="0.3"/>
  <rect x="21" y="36" width="5" height="4" rx="1.5" fill="#e2e8f0"/>
  <rect x="28" y="36" width="5" height="4" rx="1.5" fill="#e2e8f0"/>

  <!-- "Calc" text -->
  <text x="50" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Calc</text>
  
  <!-- "Advisor" text -->
  <text x="104" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="400" fill="#38bdf8" letter-spacing="-0.5">Advisor</text>
</svg>
