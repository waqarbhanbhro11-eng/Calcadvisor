<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Calculator body outline -->
  <rect x="120" y="100" width="272" height="312" rx="28" ry="28"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="12"/>

  <!-- Screen area -->
  <rect x="148" y="128" width="216" height="90" rx="14" ry="14"
        fill="rgba(255,255,255,0.08)"/>

  <!-- Screen number lines -->
  <rect x="208" y="155" width="120" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="168" y="178" width="176" height="18" rx="5" fill="url(#accent)"/>

  <!-- Button grid: 4 cols x 3 rows -->
  <!-- Row 1 -->
  <rect x="148" y="244" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="208" y="244" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="268" y="244" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="328" y="244" width="36" height="36" rx="10" fill="rgba(96,165,250,0.35)"/>

  <!-- Row 2 -->
  <rect x="148" y="292" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="208" y="292" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="268" y="292" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="328" y="292" width="36" height="36" rx="10" fill="rgba(96,165,250,0.35)"/>

  <!-- Row 3 - bottom, = button wide -->
  <rect x="148" y="340" width="48" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="208" y="340" width="108" height="36" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="328" y="340" width="36" height="36" rx="10" fill="url(#accent)"/>

  <!-- Dot accent top right corner -->
  <circle cx="384" cy="128" r="18" fill="url(#accent)" opacity="0.9"/>
  <circle cx="384" cy="128" r="8" fill="white" opacity="0.9"/>
</svg>
